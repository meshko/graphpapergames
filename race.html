<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Graph Paper Racing</title>
<style>
:root{--bg:#f7f7f2;--paper:#fffef8;--ink:#1f2937;--muted:#6b7280;--accent:#2563eb;--danger:#dc2626;--ok:#16a34a;--p1:#e11d48;--p2:#2563eb}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:grid;grid-template-columns:minmax(0,1fr)340px}main{display:flex;align-items:center;justify-content:center;padding:18px;overflow:auto}canvas{background:var(--paper);border:1px solid #cbd5e1;border-radius:14px;box-shadow:0 12px 30px #0f172a1f;max-width:100%;height:auto;touch-action:manipulation}aside{border-left:1px solid #d1d5db;background:white;padding:18px;overflow:auto}h1{font-size:22px;margin:0 0 8px}.hint,.small{color:var(--muted);font-size:13px;line-height:1.35}.status,.player{border:1px solid #e5e7eb;border-radius:12px;padding:10px;background:#f9fafb;margin-bottom:10px}.player{background:white}.active{border-color:var(--accent);box-shadow:0 0 0 3px #2563eb1f}.name{font-weight:700;display:flex;align-items:center;gap:8px}.dot{width:12px;height:12px;border-radius:999px;display:inline-block}.kv{margin-top:5px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:#374151;font-size:13px}.controls{display:grid;grid-template-columns:repeat(3,46px);gap:8px;justify-content:center;margin:14px 0}button{border:1px solid #d1d5db;background:white;color:var(--ink);border-radius:10px;padding:10px 12px;cursor:pointer;font-weight:650}button:hover{background:#f3f4f6}.controls button{width:46px;height:42px;padding:0}.wide{width:100%;margin-top:8px}label{display:block;font-size:13px;color:#374151;margin:10px 0 5px;font-weight:650}select,input{font:inherit}select{width:100%;border:1px solid #d1d5db;border-radius:10px;padding:8px;background:white}.row{display:grid;grid-template-columns:1fr 62px;gap:10px;align-items:center}.ai-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}input[type=range]{width:100%}.value{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:13px;color:#374151;text-align:right}@media(max-width:900px){body{grid-template-columns:1fr}aside{border-left:0;border-top:1px solid #d1d5db}}
</style>
</head>
<body>
<main><canvas id="board" width="1136" height="568"></canvas></main>
<aside>
<h1>Graph Paper Racing</h1>
<div class="hint">Click a highlighted candidate point, or use QWE/ASD/ZXC. Each velocity component can change by −1, 0, or +1 each turn.</div>
<div class="status" id="status"></div><div id="players"></div>
<div class="controls"><button data-ax="-1" data-ay="-1">↖</button><button data-ax="0" data-ay="-1">↑</button><button data-ax="1" data-ay="-1">↗</button><button data-ax="-1" data-ay="0">←</button><button data-ax="0" data-ay="0">·</button><button data-ax="1" data-ay="0">→</button><button data-ax="-1" data-ay="1">↙</button><button data-ax="0" data-ay="1">↓</button><button data-ax="1" data-ay="1">↘</button></div>
<label>Track</label><select id="trackSelect"><option value="oval">Oval / beginner</option><option value="bottleneck">Bottleneck</option><option value="snake">Snake</option><option value="random">Random generated</option></select>
<label>Random track size</label><select id="sizeSelect"><option value="large">Large — 60 × 42</option><option value="wide" selected>Wide — 70 × 34</option><option value="square">Square — 70 × 70</option><option value="huge">Huge — 90 × 56</option></select>
<label>Random track shape</label><select id="shapeSelect"><option value="open">Point-to-point road</option><option value="circuit">Circular circuit / one lap</option></select>
<label>Random road width</label><div class="row"><input id="roadWidth" type="range" min="1" max="5" value="2"/><div class="value"><span id="roadWidthValue">2</span> cells</div></div>
<label>Players</label><div class="ai-grid"><select id="p0Type"><option value="human">Red: human</option><option value="ai1">Red: AI 1</option><option value="ai2">Red: AI 2</option><option value="ai3">Red: AI 3</option><option value="ai4">Red: AI 4</option></select><select id="p1Type"><option value="human">Blue: human</option><option value="ai1" selected>Blue: AI 1</option><option value="ai2">Blue: AI 2</option><option value="ai3">Blue: AI 3</option><option value="ai4">Blue: AI 4</option></select></div>
<label><input id="strictPath" type="checkbox" checked/> Crash if the line segment leaves road</label>
<button class="wide" id="newRandom">New random track</button><button class="wide" id="restart">Restart</button><button class="wide" id="undo">Undo last move</button>
<div class="small">AI level means lookahead depth. On circular tracks, cars must make almost a full lap in the intended direction before crossing start/finish counts.</div>
</aside>
<script>
'use strict';
const canvas=document.getElementById('board'),ctx=canvas.getContext('2d'),statusEl=document.getElementById('status'),playersEl=document.getElementById('players'),trackSelect=document.getElementById('trackSelect'),sizeSelect=document.getElementById('sizeSelect'),shapeSelect=document.getElementById('shapeSelect'),roadWidthEl=document.getElementById('roadWidth'),roadWidthValueEl=document.getElementById('roadWidthValue'),strictPathEl=document.getElementById('strictPath'),p0TypeEl=document.getElementById('p0Type'),p1TypeEl=document.getElementById('p1Type');
let W=70,H=34,CELL=16;const PAD=20;let state,track,history=[],randomTrackSeed=Math.floor(Math.random()*1e9),aiTimer=null;const playersTemplate=[{name:'Red',color:'#e11d48'},{name:'Blue',color:'#2563eb'}];
const key=p=>`${p.x},${p.y}`,clamp=(v,a,b)=>Math.max(a,Math.min(b,v)),gridToPx=p=>({x:PAD+p.x*CELL,y:PAD+p.y*CELL}),pxToGrid=(x,y)=>({x:Math.round((x-PAD)/CELL),y:Math.round((y-PAD)/CELL)}),onRoad=p=>track.road.has(key(p));
function configure(){const sizes={large:{w:60,h:42,c:16},wide:{w:70,h:34,c:16},square:{w:70,h:70,c:11},huge:{w:90,h:56,c:12}};const s=sizes[sizeSelect.value]||sizes.wide;W=s.w;H=s.h;CELL=s.c;canvas.width=PAD*2+(W-1)*CELL;canvas.height=PAD*2+(H-1)*CELL}
function mulberry32(seed){return function(){let t=seed+=0x6D2B79F5;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return((t^t>>>14)>>>0)/4294967296}}
function cat(p0,p1,p2,p3,t){const t2=t*t,t3=t2*t;return{x:.5*((2*p1.x)+(-p0.x+p2.x)*t+(2*p0.x-5*p1.x+4*p2.x-p3.x)*t2+(-p0.x+3*p1.x-3*p2.x+p3.x)*t3),y:.5*((2*p1.y)+(-p0.y+p2.y)*t+(2*p0.y-5*p1.y+4*p2.y-p3.y)*t2+(-p0.y+3*p1.y-3*p2.y+p3.y)*t3)}}
function addDisk(road,cx,cy,r){for(let y=Math.floor(cy-r);y<=Math.ceil(cy+r);y++)for(let x=Math.floor(cx-r);x<=Math.ceil(cx+r);x++)if(x>=0&&x<W&&y>=0&&y<H&&(x-cx)**2+(y-cy)**2<=r**2)road.add(`${x},${y}`)}
function strokeSeg(road,a,b,w){const dx=b.x-a.x,dy=b.y-a.y,l2=dx*dx+dy*dy||1;for(let y=Math.floor(Math.min(a.y,b.y)-w-1);y<=Math.ceil(Math.max(a.y,b.y)+w+1);y++)for(let x=Math.floor(Math.min(a.x,b.x)-w-1);x<=Math.ceil(Math.max(a.x,b.x)+w+1);x++){if(x<0||x>=W||y<0||y>=H)continue;const t=clamp(((x-a.x)*dx+(y-a.y)*dy)/l2,0,1),px=a.x+t*dx,py=a.y+t*dy;if(Math.hypot(x-px,y-py)<=w)road.add(`${x},${y}`)}}
function perpLine(o,t,w){const dx=t.x-o.x,dy=t.y-o.y,l=Math.hypot(dx,dy)||1,nx=-dy/l,ny=dx/l;return{x1:Math.round(clamp(o.x+nx*w,0,W-1)),y1:Math.round(clamp(o.y+ny*w,0,H-1)),x2:Math.round(clamp(o.x-nx*w,0,W-1)),y2:Math.round(clamp(o.y-ny*w,0,H-1))}}
function starts(first,second,road){const dx=second.x-first.x,dy=second.y-first.y,l=Math.hypot(dx,dy)||1,fx=dx/l,fy=dy/l,nx=-fy,ny=fx;const cs=[{x:Math.round(first.x+fx*2+nx),y:Math.round(first.y+fy*2+ny)},{x:Math.round(first.x+fx*2-nx),y:Math.round(first.y+fy*2-ny)},{x:Math.round(first.x+fx*3+nx*2),y:Math.round(first.y+fy*3+ny*2)},{x:Math.round(first.x+fx*3-nx*2),y:Math.round(first.y+fy*3-ny*2)}];const u=cs.filter(p=>road.has(key(p)));while(u.length<2){const p={x:Math.round(first.x+fx*(u.length+2)),y:Math.round(first.y+fy*(u.length+2))};u.push(p);road.add(key(p))}return u.slice(0,2)}
function buildOpenSpline(points){const c=[],e=[points[0],...points,points[points.length-1]];for(let i=1;i<e.length-2;i++)for(let s=0;s<18;s++)c.push(cat(e[i-1],e[i],e[i+1],e[i+2],s/18));c.push(points[points.length-1]);return c}
function buildClosedSpline(points){const c=[],n=points.length;for(let i=0;i<n;i++)for(let s=0;s<18;s++)c.push(cat(points[(i-1+n)%n],points[i],points[(i+1)%n],points[(i+2)%n],s/18));c.push(c[0]);return c}
function strokeCenter(c,w,road){for(let i=1;i<c.length;i++)strokeSeg(road,c[i-1],c[i],w);addDisk(road,Math.round(c[0].x),Math.round(c[0].y),w);addDisk(road,Math.round(c[c.length-1].x),Math.round(c[c.length-1].y),w)}
function makeRandom(seed){return shapeSelect.value==='circuit'?makeCircuit(seed):makeOpen(seed)}
function makeOpen(seed){const r=mulberry32(seed),road=new Set(),w=+roadWidthEl.value,margin=Math.max(5,w+4),pts=[],n=8+Math.floor(r()*5);for(let i=0;i<n;i++){const u=i/(n-1),base=margin+u*(W-1-2*margin),jx=i===0||i===n-1?0:(r()-.5)*W*.08,wave=Math.sin(u*Math.PI*(1.5+r()*2.2)+r()*Math.PI*2)*H*.2,jy=(r()-.5)*H*.35;pts.push({x:clamp(base+jx,margin,W-1-margin),y:clamp(H/2+wave+jy,margin,H-1-margin)})}pts[0].x=margin;pts[n-1].x=W-1-margin;const c=buildOpenSpline(pts);strokeCenter(c,w,road);return withProgress({road,startLine:perpLine(pts[0],pts[1],w+1),finishLine:perpLine(pts[n-1],pts[n-2],w+1),starts:starts(pts[0],pts[1],road),kind:'random',shape:'open',seed})}
function makeCircuit(seed){const r=mulberry32(seed),road=new Set(),w=+roadWidthEl.value,margin=Math.max(6,w+5),cx=(W-1)/2,cy=(H-1)/2,rx=(W-1)/2-margin,ry=(H-1)/2-margin,n=12+Math.floor(r()*5),pts=[];for(let i=0;i<n;i++){const a=-Math.PI/2+i*2*Math.PI/n,wx=.78+r()*.28,wy=.78+r()*.28;pts.push({x:clamp(cx+Math.cos(a)*rx*wx,margin,W-1-margin),y:clamp(cy+Math.sin(a)*ry*wy,margin,H-1-margin)})}const c=buildClosedSpline(pts);strokeCenter(c,w,road);const line=perpLine(pts[0],pts[1],w+1);return withProgress({road,startLine:line,finishLine:line,starts:starts(pts[0],pts[1],road),kind:'random',shape:'circuit',seed,centerline:c,lapLength:c.length})}
function makeTrack(kind){if(kind==='random')return makeRandom(randomTrackSeed);const road=new Set(),add=(x,y)=>{if(x>=0&&x<W&&y>=0&&y<H)road.add(`${x},${y}`)},rect=(x1,y1,x2,y2)=>{for(let y=y1;y<=y2;y++)for(let x=x1;x<=x2;x++)add(x,y)};let startLine,finishLine,st;if(kind==='snake'){rect(6,6,W-7,12);rect(W-13,12,W-7,H/2|0);rect(7,H/2|0,W-7,(H/2|0)+6);rect(7,(H/2|0)+6,13,H-5);rect(7,H-8,W-8,H-4);startLine={x1:6,y1:6,x2:6,y2:12};finishLine={x1:W-8,y1:H-8,x2:W-8,y2:H-4};st=[{x:7,y:8},{x:7,y:10}]}else{const cx=W/2,cy=H/2,ox=W*.4,oy=H*.36,ix=W*.22,iy=H*.18;for(let y=0;y<H;y++)for(let x=0;x<W;x++){const o=((x-cx)/ox)**2+((y-cy)/oy)**2,inn=((x-cx)/ix)**2+((y-cy)/iy)**2;if(o<=1&&inn>=1)add(x,y)}startLine={x1:Math.round(cx),y1:Math.round(cy-oy),x2:Math.round(cx),y2:Math.round(cy-iy)};finishLine={x1:Math.round(cx+1),y1:Math.round(cy-oy),x2:Math.round(cx+1),y2:Math.round(cy-iy)};st=[{x:Math.round(cx-2),y:Math.round(cy-(oy+iy)/2)},{x:Math.round(cx-2),y:Math.round(cy-(oy+iy)/2+2)}]}return withProgress({road,startLine,finishLine,starts:st,kind,shape:'open'})}
function cellsNearLine(line,r){const out=[],a={x:line.x1,y:line.y1},b={x:line.x2,y:line.y2},dx=b.x-a.x,dy=b.y-a.y,l2=dx*dx+dy*dy||1;for(let y=Math.floor(Math.min(a.y,b.y)-r);y<=Math.ceil(Math.max(a.y,b.y)+r);y++)for(let x=Math.floor(Math.min(a.x,b.x)-r);x<=Math.ceil(Math.max(a.x,b.x)+r);x++){if(x<0||x>=W||y<0||y>=H)continue;const t=clamp(((x-a.x)*dx+(y-a.y)*dy)/l2,0,1);if(Math.hypot(x-(a.x+t*dx),y-(a.y+t*dy))<=r)out.push({x,y})}return out}
function withProgress(t){const dist=new Map(),q=[];for(const p of cellsNearLine(t.finishLine,+roadWidthEl.value+1))if(t.road.has(key(p))&&!dist.has(key(p))){dist.set(key(p),0);q.push(p)}for(let qi=0;qi<q.length;qi++){const p=q[qi],d=dist.get(key(p));for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){if(!dx&&!dy)continue;const n={x:p.x+dx,y:p.y+dy},k=key(n);if(t.road.has(k)&&!dist.has(k)){dist.set(k,d+1);q.push(n)}}}t.distToFinish=dist;t.maxDist=Math.max(1,...dist.values(),1);return t}
function depth(i){const v=(i?p1TypeEl:p0TypeEl).value;return v.startsWith('ai')?+v.slice(2):0}
function reset(){clearTimeout(aiTimer);configure();roadWidthValueEl.textContent=roadWidthEl.value;track=makeTrack(trackSelect.value);history=[];state={turn:0,winner:null,message:'Red to move.',players:playersTemplate.map((p,i)=>({...p,id:i,pos:{...track.starts[i]},vel:{x:0,y:0},path:[{...track.starts[i]}],crashed:false,finished:false,moves:0,lapProgress:0,aiDepth:depth(i)}))};draw();render();scheduleAI()}
function clone(o){return JSON.parse(JSON.stringify(o))}
function samples(a,b){const n=Math.max(Math.abs(b.x-a.x),Math.abs(b.y-a.y),1)*8,out=[];for(let i=0;i<=n;i++){const t=i/n;out.push({x:Math.round(a.x+(b.x-a.x)*t),y:Math.round(a.y+(b.y-a.y)*t)})}return out}
function occupied(pos,pl){return state.players.some(p=>p.id!==pl.id&&!p.crashed&&!p.finished&&p.pos.x===pos.x&&p.pos.y===pos.y)}
function legal(pl,a){const nv={x:pl.vel.x+a.x,y:pl.vel.y+a.y},np={x:pl.pos.x+nv.x,y:pl.pos.y+nv.y};if(!onRoad(np))return{ok:false,nextVel:nv,nextPos:np,reason:'Endpoint is outside road.'};if(occupied(np,pl))return{ok:false,nextVel:nv,nextPos:np,reason:'Another car already occupies that point.'};if(strictPathEl.checked)for(const p of samples(pl.pos,np))if(!onRoad(p))return{ok:false,nextVel:nv,nextPos:np,reason:'Path crosses outside road.'};return{ok:true,nextVel:nv,nextPos:np,reason:''}}
function movesFor(pl){const a=[];for(let ay=-1;ay<=1;ay++)for(let ax=-1;ax<=1;ax++)a.push({ax,ay,...legal(pl,{x:ax,y:ay})});return a}function moves(){return movesFor(state.players[state.turn])}
function ccw(a,b,c){return(c.y-a.y)*(b.x-a.x)>(b.y-a.y)*(c.x-a.x)}function intersects(a,b,c,d){return ccw(a,c,d)!==ccw(b,c,d)&&ccw(a,b,c)!==ccw(a,b,d)}
function nearestIdx(pos){let best=0,bd=1/0;if(!track.centerline)return 0;for(let i=0;i<track.centerline.length;i++){const p=track.centerline[i],d=(pos.x-p.x)**2+(pos.y-p.y)**2;if(d<bd){bd=d;best=i}}return best}
function updateLap(pl,pos){if(track.shape!=='circuit'||!track.centerline)return pl.lapProgress||0;const n=track.lapLength,idx=nearestIdx(pos),prev=pl.lapProgress||0,base=Math.floor(prev/n)*n,cs=[base+idx,base+idx+n,base+idx-n];let best=cs[0];for(const c of cs)if(Math.abs(c-prev)<Math.abs(best-prev))best=c;if(best>prev+80)best=prev+80;if(best<prev-12)best=prev-12;return Math.max(0,best)}
function crossed(pl,a,b){const ok=intersects(a,b,{x:track.finishLine.x1,y:track.finishLine.y1},{x:track.finishLine.x2,y:track.finishLine.y2});if(!ok)return false;return track.shape!=='circuit'||pl.lapProgress>=track.lapLength*.88}
function doMove(a){if(state.winner!==null)return;const pl=state.players[state.turn];history.push(clone(state));const m=legal(pl,a),old={...pl.pos};pl.vel=m.nextVel;pl.pos=m.nextPos;pl.lapProgress=updateLap(pl,pl.pos);pl.path.push({...pl.pos});pl.moves++;if(!m.ok){pl.crashed=true;state.message=`${pl.name} crashed: ${m.reason}`}else if(crossed(pl,old,pl.pos)){pl.finished=true;state.winner=state.turn;state.message=`${pl.name} wins!`}else state.message=`${pl.name} moved to (${pl.pos.x}, ${pl.pos.y}) with velocity (${pl.vel.x}, ${pl.vel.y}).`;if(state.winner===null)advanceTurn();draw();render();scheduleAI()}
function advanceTurn(){for(let n=1;n<=state.players.length;n++){const i=(state.turn+n)%state.players.length;if(!state.players[i].crashed&&!state.players[i].finished){state.turn=i;break}}if(!moves().some(m=>m.ok)){const p=state.players[state.turn];p.crashed=true;state.message=`${p.name} has no legal moves and crashes.`;advanceTurn()}}
function simMove(pl,m){const s={...pl,pos:{...m.nextPos},vel:{...m.nextVel},moves:pl.moves+1};s.lapProgress=updateLap(s,s.pos);return s}
function evalAI(pl){const sp=Math.hypot(pl.vel.x,pl.vel.y),safe=movesFor(pl).filter(m=>m.ok).length;if(track.shape==='circuit')return(pl.lapProgress||0)*9+sp*1.4+safe*4;const d=track.distToFinish.get(key(pl.pos));return(d==null?-5000:-d*15)+sp*1.6+safe*3}
function searchAI(pl,d){if(d<=0)return evalAI(pl);const ls=movesFor(pl).filter(m=>m.ok);if(!ls.length)return-1e6;let best=-1e9;for(const m of ls){const s=simMove(pl,m),old=pl.pos;let score;if(intersects(old,s.pos,{x:track.finishLine.x1,y:track.finishLine.y1},{x:track.finishLine.x2,y:track.finishLine.y2})&&(track.shape!=='circuit'||s.lapProgress>=track.lapLength*.88))score=1e6+d*1000;else score=searchAI(s,d-1);if(score>best)best=score}return best}
function chooseAI(pl,d){const ls=movesFor(pl).filter(m=>m.ok);let best=ls[0],bs=-1e9;for(const m of ls){const s=simMove(pl,m),score=searchAI(s,d-1)+Math.random()*.02;if(score>bs){bs=score;best=m}}return best}
function scheduleAI(){clearTimeout(aiTimer);if(state.winner!==null)return;const p=state.players[state.turn];if(p.aiDepth>0&&!p.crashed)aiTimer=setTimeout(()=>{const m=chooseAI(p,p.aiDepth);if(m)doMove({x:m.ax,y:m.ay})},250)}
function drawGrid(){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.fillStyle='#fffef8';ctx.fillRect(0,0,canvas.width,canvas.height);for(let x=0;x<W;x++){ctx.strokeStyle=x%5?'#e5e7eb':'#cbd5e1';const px=PAD+x*CELL;ctx.beginPath();ctx.moveTo(px,PAD);ctx.lineTo(px,PAD+(H-1)*CELL);ctx.stroke()}for(let y=0;y<H;y++){ctx.strokeStyle=y%5?'#e5e7eb':'#cbd5e1';const py=PAD+y*CELL;ctx.beginPath();ctx.moveTo(PAD,py);ctx.lineTo(PAD+(W-1)*CELL,py);ctx.stroke()}}
function drawLine(line,color,w,dash=[]){const a=gridToPx({x:line.x1,y:line.y1}),b=gridToPx({x:line.x2,y:line.y2});ctx.save();ctx.strokeStyle=color;ctx.lineWidth=w;ctx.setLineDash(dash);ctx.lineCap='round';ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();ctx.restore()}
function drawRoad(){ctx.fillStyle='rgba(229,231,235,.72)';for(const s of track.road){const[x,y]=s.split(',').map(Number),p=gridToPx({x,y});ctx.fillRect(p.x-CELL/2,p.y-CELL/2,CELL,CELL)}drawLine(track.startLine,'#111827',5,[8,6]);drawLine(track.finishLine,'#16a34a',6)}
function drawPaths(){for(const pl of state.players){ctx.save();ctx.strokeStyle=pl.color;ctx.fillStyle=pl.color;ctx.lineWidth=3;ctx.globalAlpha=pl.crashed?.45:1;ctx.beginPath();pl.path.forEach((gp,i)=>{const p=gridToPx(gp);i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y)});ctx.stroke();pl.path.forEach((gp,i)=>{const p=gridToPx(gp);ctx.beginPath();ctx.arc(p.x,p.y,i===pl.path.length-1?6:3.2,0,Math.PI*2);ctx.fill()});if(pl.crashed){const p=gridToPx(pl.pos);ctx.strokeStyle='#dc2626';ctx.beginPath();ctx.moveTo(p.x-8,p.y-8);ctx.lineTo(p.x+8,p.y+8);ctx.moveTo(p.x+8,p.y-8);ctx.lineTo(p.x-8,p.y+8);ctx.stroke()}ctx.restore()}}
function drawCandidates(){const pl=state.players[state.turn];if(state.winner!==null||pl.aiDepth>0)return;for(const m of moves()){const p=gridToPx(m.nextPos);ctx.save();ctx.globalAlpha=m.ok?.9:.18;ctx.fillStyle=m.ok?pl.color:'#dc2626';ctx.beginPath();ctx.arc(p.x,p.y,m.ok?7:5,0,Math.PI*2);ctx.fill();ctx.restore()}}
function draw(){drawGrid();drawRoad();drawPaths();drawCandidates()}
function esc(s){return String(s).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function render(){const a=state.players[state.turn];statusEl.innerHTML=`<strong>${state.winner===null?a.name+' to move':'Game over'}</strong><div>${esc(state.message)}</div><div class="kv">active = ${a.aiDepth?'AI '+a.aiDepth:'human'}</div>`;playersEl.innerHTML=state.players.map((p,i)=>`<div class="player ${i===state.turn&&state.winner===null?'active':''}"><div class="name"><span class="dot" style="background:${p.color}"></span>${p.name}${p.aiDepth?' — AI '+p.aiDepth:''}${p.crashed?' — crashed':''}${p.finished?' — finished':''}</div><div class="kv">pos = (${p.pos.x}, ${p.pos.y})</div><div class="kv">vel = (${p.vel.x}, ${p.vel.y})</div><div class="kv">moves = ${p.moves}</div>${track.shape==='circuit'?`<div class="kv">lap = ${Math.min(100,Math.floor((p.lapProgress||0)/track.lapLength*100))}%</div>`:''}</div>`).join('')}
canvas.addEventListener('click',ev=>{if(state.winner!==null||state.players[state.turn].aiDepth>0)return;const r=canvas.getBoundingClientRect(),gp=pxToGrid((ev.clientX-r.left)*canvas.width/r.width,(ev.clientY-r.top)*canvas.height/r.height),m=moves().find(x=>x.ok&&x.nextPos.x===gp.x&&x.nextPos.y===gp.y);if(m)doMove({x:m.ax,y:m.ay})});
document.querySelectorAll('.controls button').forEach(b=>b.addEventListener('click',()=>{if(state.players[state.turn].aiDepth===0)doMove({x:+b.dataset.ax,y:+b.dataset.ay})}));
document.getElementById('newRandom').onclick=()=>{randomTrackSeed=Math.floor(Math.random()*1e9);trackSelect.value='random';reset()};document.getElementById('restart').onclick=reset;document.getElementById('undo').onclick=()=>{clearTimeout(aiTimer);if(history.length){state=history.pop();draw();render();scheduleAI()}};
[trackSelect,sizeSelect,shapeSelect,p0TypeEl,p1TypeEl].forEach(e=>e.addEventListener('change',reset));roadWidthEl.addEventListener('input',()=>{roadWidthValueEl.textContent=roadWidthEl.value;if(trackSelect.value==='random')reset()});strictPathEl.addEventListener('change',()=>{draw();render();scheduleAI()});
window.addEventListener('keydown',ev=>{const map={q:[-1,-1],w:[0,-1],e:[1,-1],a:[-1,0],s:[0,0],d:[1,0],z:[-1,1],x:[0,1],c:[1,1]},k=ev.key.toLowerCase();if(map[k]&&state.players[state.turn].aiDepth===0){ev.preventDefault();doMove({x:map[k][0],y:map[k][1]})}if((ev.metaKey||ev.ctrlKey)&&k==='z'){ev.preventDefault();document.getElementById('undo').click()}});
reset();
</script>
</body>
